version: 2.1

orbs:
  slack: circleci/slack@5.1.1
  scotty-orb: cci-releng/scotty-orb@0.0.12

executors:
  deploy:
    docker:
      - image: cimg/deploy:2025.01
    resource_class: medium
  ccc:
    docker:
      - image: circleci/command-convenience:0.1
        auth:
          username: $DOCKER_HUB_USER
          password: $DOCKER_HUB_PASSWORD

commands:
  notify_failing_branch:
    steps:
      - slack/notify:
          channel: server-alerts
          branch_pattern: main, server-[0-9]\.[0-9]+
          event: fail
          template: basic_fail_1
  set_up_container:
    description: "Set up a container build environment"
    steps:
      - setup_remote_docker
      - checkout

jobs:
  # Images
  scan_postgresql:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Scan server-postgres image
          command: scan
          environment:
            NAME: server-postgres
            DOCKERFILE_PATH: Dockerfile
            MAJOR_VERSION: 13.21
          pwd: postgresql/13
  scan_rabbitmq:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Scan server-rabbitmq image
          command: scan
          environment:
            NAME: server-rabbitmq
            DOCKERFILE_PATH: Dockerfile
            MAJOR_VERSION: 3.12
          pwd: rabbitmq/3
  scan_redis:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Scan server-redis image
          command: scan
          environment:
            NAME: server-redis
            DOCKERFILE_PATH: Dockerfile
            MAJOR_VERSION: 6.2
          pwd: redis/6.2/debian-10
  scan_mongodb:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Scan server-mongodb image
          command: scan
          environment:
            NAME: server-mongodb
            DOCKERFILE_PATH: Dockerfile
            MAJOR_VERSION: 7.0
          pwd: mongodb/7.0/debian-12
  publish_postgresql:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Build and publish server-postgres image
          command: publish
          environment:
            NAME: server-postgres
            DOCKERFILE_PATH: Dockerfile
            DOCKER_REGISTRY: dockerhub
            MAJOR_VERSION: 13.21
          pwd: postgresql/13
  publish_rabbitmq:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Build and publish server-rabbitmq image
          command: publish
          environment:
            NAME: server-rabbitmq
            DOCKERFILE_PATH: Dockerfile
            DOCKER_REGISTRY: dockerhub
            MAJOR_VERSION: 3.12
          pwd: rabbitmq/3
  publish_redis:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Build and publish server-redis image
          command: publish
          environment:
            NAME: server-redis
            DOCKERFILE_PATH: Dockerfile
            DOCKER_REGISTRY: dockerhub
            MAJOR_VERSION: 6.2
          pwd: redis/6.2/debian-10
  publish_mongodb:
    executor: ccc
    steps:
      - set_up_container
      - run:
          name: Build and publish server-mongodb image
          command: publish
          environment:
            NAME: server-mongodb
            DOCKERFILE_PATH: Dockerfile
            DOCKER_REGISTRY: dockerhub
            MAJOR_VERSION: 7.0
          pwd: mongodb/7.0/debian-12

workflows:
  my-workflow:
    jobs:
      # Image jobs
      - scan_rabbitmq:
          context: "org-global"
          filters:
            branches:
              ignore:
                - main
                - /^server-\d\..+/
      - scan_postgresql:
          context: "org-global"
          filters:
            branches:
              ignore:
                - main
                - /^server-\d\..+/
      - scan_redis:
          context: "org-global"
          filters:
            branches:
              ignore:
                - main
                - /^server-\d\..+/
      - scan_mongodb:
          context: "org-global"
          filters:
            branches:
              ignore:
                - main
                - /^server-\d\..+/
      - publish_rabbitmq:
          context: "org-global"
          filters:
            branches:
              only:
                - main
                - /^server-\d\..+/
      - publish_postgresql:
          context: "org-global"
          filters:
            branches:
              only:
                - main
                - /^server-\d\..+/
      - publish_redis:
          context: "org-global"
          filters:
            branches:
              only:
                - main
                - /^server-\d\..+/
      - publish_mongodb:
          context: "org-global"
          filters:
            branches:
              only:
                - main
                - /^server-\d\..+/
      - scotty-orb/test-in-server-and-promote:
          name: test-in-server-and-promote
          context: ["org-global", github-readonly]
          requires:
            - publish_rabbitmq
            - publish_postgresql
            - publish_redis
            - publish_mongodb
          promotion_component_list: "circleci/server-postgres circleci/server-rabbitmq circleci/server-redis"
          filters:
            branches:
              only:
                - main
                - /^server-\d\..+/
